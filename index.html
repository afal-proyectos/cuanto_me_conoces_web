<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Cuánto Me Conoces! - Juego</title>
    
    <!-- 1. Importamos la librería oficial de Supabase desde la web (Cero instalaciones) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="contenedor-pantalla" style="padding: 20px; font-family: sans-serif; text-align: center;">
        <h2>Cargando el juego...</h2>
        <p>Espera un momento mientras conectamos con la partida.</p>
    </div>

    <script>
        // 2. Configura tus credenciales (Usa las mismas de tu archivo .env de Python)
        const SUPABASE_URL = "https://ddmnhwvzqbojbfqjhrio.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbW5od3Z6cWJvamJmcWpocmlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NTM4NDcsImV4cCI6MjEwMDEyOTg0N30.bePsqv4Qa5e_Edee-AkJCv9wN4faobh_cmF0TEYjlk0";
        
        // Inicializamos el cliente de Supabase en el navegador
        const supabase_client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 3. Capturar el ID del Quizz desde la URL (?id=xxxx)
        const parametrosURL = new URLSearchParams(window.location.search);
        const idQuizz = parametrosURL.get('id');

        //Lista de pregunta
        let preguntasCargadas = [];
        
        
        // Función principal que arranca al cargar la página
        async function iniciarJuego() {
            const contenedor = document.getElementById("contenedor-pantalla");

            if (!idQuizz) {
                contenedor.innerHTML = "<h2>⚠️ Error: No se encontró ningún código de juego.</h2><p>Escanea el QR de nuevo.</p>";
                return;
            }

            console.log("Descargando el Quizz con ID:", idQuizz);

            try {
                // 4. La consulta relacional en JavaScript (Equivalente al JOIN de tu backend)
                // Traemos la relación usando los nuevos nombres con guiones bajos
                const { data, error } = await supabase_client
                    .from('Quizz_Preguntas')
                    .select(`
                        index_pregunta,
                        Preguntas (
                            id_pregunta,
                            texto_pregunta,
                            Preguntas_Opciones (
                                index_opcion,
                                Opciones (
                                    id_opcion,
                                    texto_opcion,
                                    puntaje
                                )
                            )
                        )
                    `)
                    .eq('id_quizz', idQuizz)
                    .order('index_pregunta',{ascending: true});
                if (error) throw error;

                if (!data || data.length === 0) {
                    contenedor.innerHTML = "<h2>⚠️ El juego no existe o no tiene preguntas.</h2>";
                    return;
                }

                preguntasCargadas = data; //respaldo de datos
                
                // 5. Renderizado básico de prueba en la pantalla del celular
                renderizarInterfaz(contenedor);

            } catch (err) {
                console.error("Error al conectar con Supabase:", err);
                contenedor.innerHTML = `<h2>💥 Hubo un problema al cargar las preguntas.</h2><p style="color:red;">Detalles: ${err.message || err}</p>`;

            }
        }

        function renderizarInterfaz(contenedor) {
            // Limpiamos el mensaje de "Cargando..."
            contenedor.innerHTML = `
                <h1 style="text-align:center;">🎮 ¡A Jugar!</h1>
                <div style="margin-bottom: 25px;">
                    <label style="font-weight:bold; display:block; margin-bottom:5px;">Tu Nombre o Apodo:</label>
                    <input type="text" id="nombre-jugador" placeholder="Ej. Ale o Juani" style="width:100%; padding: 10px; border-radius:5px; border: 1px solid #ccc; box-sizing: border-box;">
                </div>
                <hr>
            `;

            // Recorremos las preguntas estructuradas que nos devolvió Supabase
            preguntasCargadas.forEach(item => {
                const pregunta = item.Preguntas;
                // Creamos el bloque de la pregunta
                const bloque = document.createElement("div");
                bloque.style.margin = "30px 0";
                bloque.innerHTML = `<h3>${item.index_pregunta}. ${pregunta.texto_pregunta}</h3>`;
                
                // Recorremos y añadimos sus opciones correspondientes
                pregunta.Preguntas_Opciones.forEach(relOpcion => {
                    const opcion = relOpcion.Opciones;
                    bloque.innerHTML += `
                        <label style="display: block; margin: 8px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer;">
                            <input type="radio" name="pregunta_${pregunta.id_pregunta}" value="${opcion.id_opcion}" style="margin-right: 10px;">
                            ${opcion.texto_opcion} 
                        </label>
                    `;
                });
                
                contenedor.appendChild(bloque);
            });
            //Botón de envío final
            const botonEnviar = document.createElement("button");
            botonEnviar.innerText = "Enviar mis respuestas";
            botonEnviar.style = "width: 100%; padding: 15; background-color: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px";
            botonEnviar.onclick = enviarRespuestas;
            contenedor.appendChild(botonEnviar);
        }
                
              
        async function enviarRespuestas() {
            const nombreJugador = document.getElementById("nombre-jugador").value.trim();
            if (!nombreJugador){
                alert("Por favor, escribe tu nombre.");
                return;
            } 
            //Contruir el objeto Json simple
            const mapaRespuestas = {}

            for (const item of preguntasCargadas){
                const idPregunta = item.Preguntas.id_pregunta;
                const opcionSeleccionada = document.querySelector(`input[name="pregunta_${idPregunta}"]:checked`);
                
                if (!opcionSeleccionada){
                    alert(`Te falta responder la pregunta número ${item.index_pregunta}`);
                return;
                }
                //Estructura: {"uuid_pregunta": "uuid_opcion"}
                mapaRespuestas[idPregunta] = opcionSeleccionada.value;
            }

            const contenedor = document.getElementById("contenedor-pantalla");
            contenedor.innerHTML = "<h2>Subiendo tus respuestas... </h2>";
            
            //necesito obter el id del jugador (que es un uuid)
            
            try {
                //crear al jugador
                const idJugador = crypto.randomUUID();
                const   {error: errJugador} = await supabase_client
                    .from('Jugadores')
                    .insert({
                        id_jugador: idJugador,
                        nombre_jugador: nombreJugador
                    });
                if (errJugador) throw error;
                //fila única de JSON encapsulado
                const   {error: errResp} = await supabase_client
                    .from('Respuestas')
                    .insert({
                        id_quizz: idQuizz,
                        id_jugador: idJugador,
                        lista_respuesta: mapaRespuestas // Supabase detecta
                    });
                if (errResp) throw error;
                
                contenedor.innerHTML = `
                    <div style="text-align:center; padding: 40px 20px;">
                        <h1 style="color: #4CAF50;">¡Datos Recibidos! 🎉</h1>
                        <p>Hola <strong>${nombreJugador}</strong>, tus respuestas ya están en el servidor.</p>
                        <p>¡Mira la pantalla principal para ver tu puntuación!</p>
                    </div>
                `;
            } catch (err) {
                alert("Error al enviar: " + err.message);
                iniciarJuego();
            }
        }
        // Ejecutar la lógica inmediatamente al abrir la página
        iniciarJuego();
    </script>
    </body>
</html>n
